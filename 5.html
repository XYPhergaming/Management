<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
  <style>
    .dark .bg-white { background-color: #1e1e2e !important; }
    .dark .text-gray-800, .dark .text-gray-700, .dark .text-gray-600 { color: #cdd6f4 !important; }
    .dark .text-gray-500 { color: #a6adc8 !important; }
    .dark .bg-gray-100, .dark .bg-gray-50 { background-color: #181825 !important; }
    .dark .border, .dark .border-gray-300, .dark .border-gray-200 { border-color: #313244 !important; }
    .dark input, .dark select, .dark textarea { background-color: #313244; color: #cdd6f4; border-color: #45475a; }
    .dark button.bg-purple-600 { background-color: #cba6f7 !important; color: #1e1e2e !important; }
    .dark button.bg-green-600 { background-color: #a6e3a1 !important; color: #1e1e2e !important; }
    .dark button.bg-red-600 { background-color: #f38ba8 !important; color: #1e1e2e !important; }
    .dark button.bg-gray-200 { background-color: #45475a !important; color: #cdd6f4 !important; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen transition-colors duration-300" id="mainBody">
  <div class="container mx-auto p-4 max-w-7xl">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800">GitHub Manager</h1>
      <div class="flex gap-3 items-center">
        <button id="darkModeToggle" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-xl transition">
          Dark Mode
        </button>
        <button id="saveTokenBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-xl transition">
          Save Token
        </button>
        <button id="clearTokenBtn" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-xl transition">
          Clear Token
        </button>
      </div>
    </div>

    <!-- Credentials (always visible) -->
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Token</label>
          <input id="token" type="password" placeholder="ghp_..." class="w-full border rounded-xl px-3 py-2 mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Owner</label>
          <input id="owner" type="text" placeholder="username" class="w-full border rounded-xl px-3 py-2 mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Repository</label>
          <input id="repo" type="text" placeholder="repo-name" class="w-full border rounded-xl px-3 py-2 mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Branch</label>
          <input id="branch" type="text" value="main" class="w-full border rounded-xl px-3 py-2 mt-1">
        </div>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="flex flex-wrap gap-2 mb-4">
      <button class="tab-btn active bg-purple-600 text-white px-4 py-2 rounded-xl" data-tab="push">Push</button>
      <button class="tab-btn bg-gray-200 text-gray-800 px-4 py-2 rounded-xl" data-tab="pull">Pull</button>
      <button class="tab-btn bg-gray-200 text-gray-800 px-4 py-2 rounded-xl" data-tab="browse">Browse Files</button>
      <button class="tab-btn bg-gray-200 text-gray-800 px-4 py-2 rounded-xl" data-tab="history">History</button>
      <button class="tab-btn bg-gray-200 text-gray-800 px-4 py-2 rounded-xl" data-tab="branches">Branches</button>
      <button class="tab-btn bg-gray-200 text-gray-800 px-4 py-2 rounded-xl" data-tab="prs">Pull Requests</button>
      <button class="tab-btn bg-gray-200 text-gray-800 px-4 py-2 rounded-xl" data-tab="editor">Editor</button>
      <button class="tab-btn bg-gray-200 text-gray-800 px-4 py-2 rounded-xl" data-tab="repoSettings">Repo Settings</button>
    </div>

    <!-- Tab Content Containers -->
    <div id="tabContent" class="bg-white rounded-2xl shadow-lg p-6"></div>
  </div>

  <script>
    // ==================== GLOBAL STATE ====================
    let currentTab = 'push';
    let stagedChanges = []; // { path, content, action: 'edit'|'delete'|'add' }
    let cachedRepoFiles = {}; // path -> base64 content for offline/editor
    // Dark mode
    let darkMode = localStorage.getItem('darkMode') === 'true';
    if (darkMode) document.getElementById('mainBody').classList.add('dark');

    // IndexedDB for offline cache
    let db;
    const DB_NAME = 'github-manager-cache';
    const STORE_NAME = 'repoFiles';

    // Notification permission request
    if ('Notification' in window) Notification.requestPermission();

    // ==================== INIT ====================
    document.addEventListener('DOMContentLoaded', () => {
      // Load saved credentials
      const saved = JSON.parse(localStorage.getItem('ghCreds') || '{}');
      if (saved.token) document.getElementById('token').value = saved.token;
      if (saved.owner) document.getElementById('owner').value = saved.owner;
      if (saved.repo) document.getElementById('repo').value = saved.repo;
      if (saved.branch) document.getElementById('branch').value = saved.branch;

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-purple-600', 'text-white'));
          btn.classList.add('active', 'bg-purple-600', 'text-white');
          currentTab = btn.dataset.tab;
          renderTabContent(currentTab);
        });
      });

      // Dark mode toggle
      document.getElementById('darkModeToggle').addEventListener('click', () => {
        darkMode = !darkMode;
        document.getElementById('mainBody').classList.toggle('dark', darkMode);
        localStorage.setItem('darkMode', darkMode);
      });

      // Save/clear token
      document.getElementById('saveTokenBtn').addEventListener('click', () => {
        const creds = {
          token: document.getElementById('token').value.trim(),
          owner: document.getElementById('owner').value.trim(),
          repo: document.getElementById('repo').value.trim(),
          branch: document.getElementById('branch').value.trim() || 'main'
        };
        localStorage.setItem('ghCreds', JSON.stringify(creds));
        alert('Credentials saved');
      });
      document.getElementById('clearTokenBtn').addEventListener('click', () => {
        localStorage.removeItem('ghCreds');
        document.getElementById('token').value = '';
        document.getElementById('owner').value = '';
        document.getElementById('repo').value = '';
        document.getElementById('branch').value = 'main';
        alert('Credentials cleared');
      });

      // Open IndexedDB
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore(STORE_NAME);
      };
      request.onsuccess = (e) => {
        db = e.target.result;
      };

      renderTabContent('push');
    });

    function getCreds() {
      return {
        token: document.getElementById('token').value.trim(),
        owner: document.getElementById('owner').value.trim(),
        repo: document.getElementById('repo').value.trim(),
        branch: document.getElementById('branch').value.trim() || 'main'
      };
    }

    function apiHeaders(token) {
      return { Authorization: `token ${token}` };
    }

    function notify(msg) {
      if (Notification.permission === 'granted') {
        new Notification('GitHub Manager', { body: msg });
      }
    }

    // ==================== TAB RENDERER ====================
    async function renderTabContent(tab) {
      const container = document.getElementById('tabContent');
      switch(tab) {
        case 'push': container.innerHTML = await pushTabHTML(); break;
        case 'pull': container.innerHTML = await pullTabHTML(); break;
        case 'browse': container.innerHTML = await browseTabHTML(); break;
        case 'history': container.innerHTML = await historyTabHTML(); break;
        case 'branches': container.innerHTML = await branchesTabHTML(); break;
        case 'prs': container.innerHTML = await prsTabHTML(); break;
        case 'editor': container.innerHTML = await editorTabHTML(); break;
        case 'repoSettings': container.innerHTML = await repoSettingsTabHTML(); break;
      }
      // Re-run any tab-specific JS
      if (tab === 'push') initPushTab();
      if (tab === 'pull') initPullTab();
      if (tab === 'browse') initBrowseTab();
      if (tab === 'history') initHistoryTab();
      if (tab === 'branches') initBranchesTab();
      if (tab === 'prs') initPRsTab();
      if (tab === 'editor') initEditorTab();
      if (tab === 'repoSettings') initRepoSettingsTab();
    }
    // ==================== PUSH TAB ====================
    function pushTabHTML() {
      return `
        <h2 class="text-xl font-semibold mb-4">Push to GitHub</h2>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700">Commit message</label>
          <input id="commitMsg" type="text" value="Add files via web push" class="w-full border rounded-xl px-3 py-2 mt-1">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Upload Mode</label>
          <div class="flex gap-4">
            <label><input type="radio" name="pushMode" value="files" checked class="accent-purple-600"> Files</label>
            <label><input type="radio" name="pushMode" value="zip" class="accent-purple-600"> ZIP</label>
          </div>
        </div>
        <div id="pushFilesArea">
          <div class="mb-2">
            <label class="block text-sm font-medium text-gray-700">Select files (or drag & drop)</label>
            <input id="fileInput" type="file" multiple class="w-full mt-1 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-purple-100">
          </div>
        </div>
        <div id="pushZipArea" class="hidden mb-4">
          <label class="block text-sm font-medium text-gray-700">Select ZIP</label>
          <input id="zipInput" type="file" accept=".zip" class="w-full mt-1 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-purple-100">
          <label class="flex items-center gap-2 mt-2 text-sm text-gray-600"><input type="checkbox" id="stripRoot" checked class="accent-purple-600"> Strip root folder</label>
        </div>
        <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center text-gray-500 mt-2">
          Drag & drop files or ZIP here
        </div>
        <button id="pushBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl mt-3">Push</button>
        <div id="pushStatus" class="mt-3 text-sm text-center"></div>
      `;
    }

    function initPushTab() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const zipInput = document.getElementById('zipInput');
      const pushBtn = document.getElementById('pushBtn');
      const statusDiv = document.getElementById('pushStatus');
      const filesModeRadio = document.querySelector('input[value="files"]');
      const zipModeRadio = document.querySelector('input[value="zip"]');
      const filesArea = document.getElementById('pushFilesArea');
      const zipArea = document.getElementById('pushZipArea');

      filesModeRadio.addEventListener('change', () => { filesArea.classList.remove('hidden'); zipArea.classList.add('hidden'); });
      zipModeRadio.addEventListener('change', () => { filesArea.classList.add('hidden'); zipArea.classList.remove('hidden'); });

      // Drag & drop handling
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('bg-purple-50'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('bg-purple-50'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('bg-purple-50');
        if (zipModeRadio.checked) {
          zipInput.files = e.dataTransfer.files;
        } else {
          fileInput.files = e.dataTransfer.files;
        }
      });

      async function fileToBase64(file) {
        const buf = await file.arrayBuffer();
        const bytes = new Uint8Array(buf);
        let binary = '';
        bytes.forEach(b => binary += String.fromCharCode(b));
        return btoa(binary);
      }
      async function processZip(zipFile, stripRoot) {
        const zip = await JSZip.loadAsync(zipFile);
        const files = [];
        let rootPrefix = null;
        if (stripRoot) {
          zip.forEach((path, entry) => {
            if (entry.dir) return;
            const parts = path.split('/');
            if (parts.length > 1) {
              const candidate = parts[0] + '/';
              if (!rootPrefix) rootPrefix = candidate;
              else if (rootPrefix !== candidate) rootPrefix = null;
            } else rootPrefix = null;
          });
        }
        const promises = [];
        zip.forEach((path, entry) => {
          if (entry.dir) return;
          let finalPath = path;
          if (rootPrefix && finalPath.startsWith(rootPrefix)) {
            finalPath = finalPath.substring(rootPrefix.length);
            if (finalPath.startsWith('/')) finalPath = finalPath.substring(1);
          }
          promises.push(entry.async('uint8array').then(data => {
            let binary = '';
            data.forEach(b => binary += String.fromCharCode(b));
            files.push({ path: finalPath, contentBase64: btoa(binary) });
          }));
        });
        await Promise.all(promises);
        return files;
      }

      pushBtn.addEventListener('click', async () => {
        const creds = getCreds();
        if (!creds.token || !creds.owner || !creds.repo) {
          statusDiv.innerHTML = 'Missing credentials'; statusDiv.className = 'mt-3 text-sm text-center text-red-500'; return;
        }
        const message = document.getElementById('commitMsg').value.trim() || 'Web push commit';
        const isZip = zipModeRadio.checked;
        let filesToPush = [];
        try {
          if (isZip) {
            if (!zipInput.files[0]) { statusDiv.innerHTML = 'Select a ZIP'; return; }
            filesToPush = await processZip(zipInput.files[0], document.getElementById('stripRoot').checked);
          } else {
            if (fileInput.files.length === 0) { statusDiv.innerHTML = 'Select files'; return; }
            for (const f of fileInput.files) {
              filesToPush.push({ path: f.name, contentBase64: await fileToBase64(f) });
            }
          }
          if (!filesToPush.length) { statusDiv.innerHTML = 'No files'; return; }
          statusDiv.innerHTML = 'Pushing...'; pushBtn.disabled = true;
          // API push logic (similar to previous implementation)
          const token = creds.token, owner = creds.owner, repo = creds.repo, branch = creds.branch;
          let baseSha = null, emptyRepo = false;
          const refUrl = `https://api.github.com/repos/${owner}/${repo}/git/ref/heads/${branch}`;
          const refRes = await fetch(refUrl, { headers: apiHeaders(token) });
          if (refRes.ok) { const d = await refRes.json(); baseSha = d.object.sha; }
          else {
            const err = await refRes.json().catch(() => ({}));
            if (refRes.status === 409 && err.message?.includes('empty')) emptyRepo = true;
            else if (refRes.status === 404) {
              const headsRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads`, { headers: apiHeaders(token) });
              if (!headsRes.ok) throw new Error('Failed to list branches');
              const heads = await headsRes.json();
              if (!heads.length) emptyRepo = true;
              else throw new Error(`Branch ${branch} not found. Available: ${heads.map(h => h.ref.replace('refs/heads/', '')).join(', ')}`);
            } else throw new Error(err.message || 'Branch fetch failed');
          }
          const blobs = [];
          for (const f of filesToPush) {
            const blobRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/blobs`, {
              method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
              body: JSON.stringify({ content: f.contentBase64, encoding: 'base64' })
            });
            if (!blobRes.ok) throw new Error(`Blob failed for ${f.path}`);
            blobs.push({ path: f.path, sha: (await blobRes.json()).sha });
          }
          const treeItems = blobs.map(b => ({ path: b.path, mode: '100644', type: 'blob', sha: b.sha }));
          const treeBody = { tree: treeItems }; if (!emptyRepo) treeBody.base_tree = baseSha;
          const treeRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees`, {
            method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' }, body: JSON.stringify(treeBody)
          });
          if (!treeRes.ok) throw new Error('Tree creation failed');
          const treeSha = (await treeRes.json()).sha;
          const commitRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/commits`, {
            method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, tree: treeSha, parents: emptyRepo ? [] : [baseSha] })
          });
          if (!commitRes.ok) throw new Error('Commit failed');
          const commitSha = (await commitRes.json()).sha;
          if (emptyRepo) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs`, {
              method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
              body: JSON.stringify({ ref: `refs/heads/${branch}`, sha: commitSha })
            });
          } else {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/${branch}`, {
              method: 'PATCH', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
              body: JSON.stringify({ sha: commitSha })
            });
          }
          statusDiv.innerHTML = `Pushed ${blobs.length} file(s).`;
          statusDiv.className = 'mt-3 text-sm text-center text-green-600';
          notify('Push successful');
        } catch (err) {
          statusDiv.innerHTML = `Error: ${err.message}`;
          statusDiv.className = 'mt-3 text-sm text-center text-red-500';
        } finally { pushBtn.disabled = false; }
      });
    }

    // ==================== PULL TAB ====================
    function pullTabHTML() { return `<h2 class="text-xl font-semibold mb-4">Pull Repository</h2><p class="text-sm text-gray-500 mb-3">Download as ZIP</p><button id="pullBtn" class="bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-xl">Download ZIP</button><div id="pullStatus" class="mt-3 text-sm"></div>`; }
    function initPullTab() {
      document.getElementById('pullBtn').addEventListener('click', async () => {
        const creds = getCreds();
        if (!creds.token) return alert('Enter token');
        const url = `https://api.github.com/repos/${creds.owner}/${creds.repo}/zipball/${creds.branch}`;
        const res = await fetch(url, { headers: apiHeaders(creds.token) });
        if (!res.ok) return document.getElementById('pullStatus').innerHTML = 'Error downloading';
        const blob = await res.blob();
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${creds.repo}-${creds.branch}.zip`; a.click();
        document.getElementById('pullStatus').innerHTML = 'Download started';
        notify('Pull successful');
      });
    }

    // ==================== BROWSE TAB ====================
    function browseTabHTML() { return `<h2 class="text-xl font-semibold mb-4">Browse Files</h2><div id="breadcrumb" class="text-sm text-gray-600 mb-2"></div><div id="fileList" class="space-y-1"></div><div id="fileContent" class="mt-4 p-4 border rounded-xl hidden"><pre><code id="codeView" class="language-javascript"></code></pre><button id="editFileBtn" class="mt-2 bg-yellow-500 text-white px-4 py-1 rounded-xl">Edit</button><button id="deleteFileBtn" class="mt-2 bg-red-500 text-white px-4 py-1 rounded-xl">Delete</button></div>`; }
    async function initBrowseTab() {
      const creds = getCreds();
      if (!creds.token) return alert('Enter token');
      const owner = creds.owner, repo = creds.repo, branch = creds.branch;
      let currentPath = '';
      async function loadTree(path='') {
        const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
        const res = await fetch(url, { headers: apiHeaders(creds.token) });
        if (!res.ok) return alert('Failed to load tree');
        const data = await res.json();
        const items = data.tree.filter(item => {
          if (!path) return !item.path.includes('/');
          return item.path.startsWith(path+'/') && item.path.split('/').length === path.split('/').length+1;
        }).map(item => ({
          name: path ? item.path.substring(path.length+1) : item.path,
          fullPath: item.path,
          type: item.type
        }));
        renderFileList(items);
        // Cache in IndexedDB
        if (db) {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          store.put(JSON.stringify(items), `tree_${path}`);
        }
      }
      function renderFileList(items) {
        const container = document.getElementById('fileList');
        container.innerHTML = items.map(item => `<div class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded cursor-pointer" data-path="${item.fullPath}" data-type="${item.type}">
          <span>${item.type === 'tree' ? '[DIR]' : ''}</span> ${item.name}
        </div>`).join('');
        document.querySelectorAll('#fileList div').forEach(el => {
          el.addEventListener('click', async () => {
            const path = el.dataset.path;
            if (el.dataset.type === 'tree') {
              currentPath = path;
              document.getElementById('breadcrumb').innerHTML = `<span class="cursor-pointer text-blue-500" data-nav="">Root</span> / ${path.split('/').map((p,i,arr) => `<span class="cursor-pointer text-blue-500" data-nav="${arr.slice(0,i+1).join('/')}">${p}</span>`).join(' / ')}`;
              loadTree(path);
            } else {
              // View file
              const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
              const fileRes = await fetch(fileUrl, { headers: apiHeaders(creds.token) });
              if (!fileRes.ok) return alert('Failed to load file');
              const fileData = await fileRes.json();
              const content = atob(fileData.content);
              document.getElementById('fileContent').classList.remove('hidden');
              const codeView = document.getElementById('codeView');
              codeView.textContent = content;
              hljs.highlightElement(codeView);
              document.getElementById('editFileBtn').onclick = () => openFileInEditor(path, content);
              document.getElementById('deleteFileBtn').onclick = async () => {
                if (confirm(`Delete ${path}?`)) {
                  await deleteFile(path);
                }
              };
            }
          });
        });
      }
      async function deleteFile(path) {
        const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const fileRes = await fetch(fileUrl, { headers: apiHeaders(creds.token) });
        const fileData = await fileRes.json();
        await fetch(fileUrl, {
          method: 'DELETE', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Delete ${path}`, sha: fileData.sha, branch })
        });
        alert('File deleted');
        loadTree(currentPath);
        notify('File deleted');
      }
      document.getElementById('breadcrumb').addEventListener('click', (e) => {
        if (e.target.dataset.nav !== undefined) {
          currentPath = e.target.dataset.nav;
          loadTree(currentPath);
        }
      });
      loadTree('');
    }

    // ==================== HISTORY TAB ====================
    function historyTabHTML() { return `<h2 class="text-xl font-semibold mb-4">Commit History</h2><div id="commitList" class="space-y-2"></div><div id="diffViewer" class="mt-4 hidden p-4 border rounded-xl"><pre id="diffOutput"></pre></div>`; }
    async function initHistoryTab() {
      const creds = getCreds();
      if (!creds.token) return alert('Enter token');
      const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/commits?sha=${creds.branch}&per_page=20`, { headers: apiHeaders(creds.token) });
      const commits = await res.json();
      const container = document.getElementById('commitList');
      container.innerHTML = commits.map(c => `<div class="p-3 border rounded-xl cursor-pointer" data-sha="${c.sha}">
        <div class="font-semibold">${c.commit.message.split('\n')[0]}</div>
        <div class="text-sm text-gray-500">${c.sha.substring(0,7)} by ${c.commit.author.name} on ${new Date(c.commit.author.date).toLocaleString()}</div>
      </div>`).join('');
      document.querySelectorAll('#commitList div').forEach(el => {
        el.addEventListener('click', async () => {
          const sha = el.dataset.sha;
          const diffRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/commits/${sha}`, { headers: apiHeaders(creds.token) });
          const commitData = await diffRes.json();
          const files = commitData.files || [];
          let diffText = '';
          files.forEach(f => {
            diffText += `--- ${f.filename}\n${f.patch || 'Binary file'}\n\n`;
          });
          document.getElementById('diffViewer').classList.remove('hidden');
          document.getElementById('diffOutput').textContent = diffText;
        });
      });
    }

    // ==================== BRANCHES TAB ====================
    function branchesTabHTML() { return `<h2 class="text-xl font-semibold mb-4">Branches</h2><div id="branchList" class="space-y-2 mb-4"></div><div class="flex gap-2"><input id="newBranchName" placeholder="New branch name" class="border rounded-xl px-3 py-2 flex-1"><button id="createBranchBtn" class="bg-purple-600 text-white px-4 py-2 rounded-xl">Create Branch</button></div>`; }
    async function initBranchesTab() {
      const creds = getCreds();
      if (!creds.token) return alert('Enter token');
      async function loadBranches() {
        const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/branches`, { headers: apiHeaders(creds.token) });
        const branches = await res.json();
        document.getElementById('branchList').innerHTML = branches.map(b => `<div class="flex justify-between items-center p-2 border rounded-xl">
          <span>${b.name}</span>
          <button class="text-red-500 delete-branch" data-name="${b.name}">Delete</button>
        </div>`).join('');
        document.querySelectorAll('.delete-branch').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm(`Delete branch ${btn.dataset.name}?`)) {
              await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/refs/heads/${btn.dataset.name}`, { method: 'DELETE', headers: apiHeaders(creds.token) });
              loadBranches();
              notify('Branch deleted');
            }
          });
        });
      }
      loadBranches();
      document.getElementById('createBranchBtn').addEventListener('click', async () => {
        const name = document.getElementById('newBranchName').value.trim();
        if (!name) return;
        const refRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/ref/heads/${creds.branch}`, { headers: apiHeaders(creds.token) });
        const refData = await refRes.json();
        await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/refs`, {
          method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: `refs/heads/${name}`, sha: refData.object.sha })
        });
        loadBranches();
        notify('Branch created');
      });
    }

    // ==================== PR TAB ====================
    function prsTabHTML() { return `<h2 class="text-xl font-semibold mb-4">Pull Requests</h2><div id="prList" class="space-y-2 mb-4"></div><button id="createPRBtn" class="bg-purple-600 text-white px-4 py-2 rounded-xl">Create PR (head: current branch, base: main)</button>`; }
    async function initPRsTab() {
      const creds = getCreds();
      if (!creds.token) return alert('Enter token');
      async function loadPRs() {
        const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/pulls?state=open`, { headers: apiHeaders(creds.token) });
        const prs = await res.json();
        document.getElementById('prList').innerHTML = prs.map(pr => `<div class="p-3 border rounded-xl">${pr.title} #${pr.number} <button class="text-red-500 ml-2 merge-pr" data-number="${pr.number}">Merge</button></div>`).join('');
        document.querySelectorAll('.merge-pr').forEach(btn => {
          btn.addEventListener('click', async () => {
            await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/pulls/${btn.dataset.number}/merge`, {
              method: 'PUT', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
              body: JSON.stringify({})
            });
            loadPRs();
            notify('PR merged');
          });
        });
      }
      loadPRs();
      document.getElementById('createPRBtn').addEventListener('click', async () => {
        const title = prompt('PR title:');
        if (!title) return;
        await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/pulls`, {
          method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, head: creds.branch, base: 'main' })
        });
        loadPRs();
        notify('PR created');
      });
    }

    // ==================== EDITOR TAB ====================
    function editorTabHTML() {
      return `<h2 class="text-xl font-semibold mb-4">File Editor & Multi-Commit Staging</h2>
      <div class="flex gap-4">
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-700">File path</label>
          <input id="editorFilePath" type="text" class="w-full border rounded-xl px-3 py-2 mt-1" placeholder="e.g. src/app.js">
          <textarea id="editorContent" rows="15" class="w-full border rounded-xl px-3 py-2 mt-2 font-mono text-sm"></textarea>
          <button id="stageChangeBtn" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded-xl">Stage Change</button>
        </div>
        <div class="w-64 bg-gray-50 p-4 rounded-xl">
          <h3 class="font-semibold mb-2">Staged Changes</h3>
          <div id="stagedList" class="space-y-1 text-sm"></div>
          <button id="commitStagedBtn" class="mt-3 bg-purple-600 text-white w-full py-2 rounded-xl">Commit Staged</button>
        </div>
      </div>`;
    }
    function initEditorTab() {
      function renderStaged() {
        const list = document.getElementById('stagedList');
        list.innerHTML = stagedChanges.map(c => `<div class="flex justify-between"><span>${c.path} (${c.action})</span><button class="text-red-500" data-path="${c.path}">x</button></div>`).join('');
        document.querySelectorAll('#stagedList button').forEach(b => b.addEventListener('click', () => {
          stagedChanges = stagedChanges.filter(c => c.path !== b.dataset.path);
          renderStaged();
        }));
      }
      document.getElementById('stageChangeBtn').addEventListener('click', () => {
        const path = document.getElementById('editorFilePath').value.trim();
        const content = document.getElementById('editorContent').value;
        if (!path) return alert('Enter path');
        stagedChanges.push({ path, content, action: 'edit' });
        renderStaged();
      });
      document.getElementById('commitStagedBtn').addEventListener('click', async () => {
        if (!stagedChanges.length) return alert('No changes staged');
        const creds = getCreds();
        if (!creds.token) return alert('Enter credentials');
        const message = prompt('Commit message:') || 'Multi-file edit';
        try {
          // For simplicity, we'll just create blobs and tree with these files (full replacement)
          // In practice we'd need current tree and only modify these files. But here we can push all staged as new blobs.
          const blobs = [];
          for (const change of stagedChanges) {
            if (change.action === 'edit' || change.action === 'add') {
              const contentBase64 = btoa(unescape(encodeURIComponent(change.content)));
              const blobRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/blobs`, {
                method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: contentBase64, encoding: 'base64' })
              });
              blobs.push({ path: change.path, sha: (await blobRes.json()).sha });
            } // ignore delete for simplicity, but could add delete handling
          }
          const treeItems = blobs.map(b => ({ path: b.path, mode: '100644', type: 'blob', sha: b.sha }));
          const baseSha = (await (await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/ref/heads/${creds.branch}`, { headers: apiHeaders(creds.token) })).json()).object.sha;
          const treeRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/trees`, {
            method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
            body: JSON.stringify({ base_tree: baseSha, tree: treeItems })
          });
          const treeSha = (await treeRes.json()).sha;
          const commitRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/commits`, {
            method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, tree: treeSha, parents: [baseSha] })
          });
          const commitSha = (await commitRes.json()).sha;
          await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/refs/heads/${creds.branch}`, {
            method: 'PATCH', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
            body: JSON.stringify({ sha: commitSha })
          });
          stagedChanges = [];
          renderStaged();
          alert('Commit successful');
          notify('Multi-file commit done');
        } catch (err) {
          alert('Error: '+err.message);
        }
      });
      renderStaged();
    }

    // Helper to open file in editor from browse
    window.openFileInEditor = function(path, content) {
      document.querySelectorAll('.tab-btn[data-tab="editor"]')[0].click();
      document.getElementById('editorFilePath').value = path;
      document.getElementById('editorContent').value = content;
    }

    // ==================== REPO SETTINGS TAB ====================
    function repoSettingsTabHTML() {
      return `<h2 class="text-xl font-semibold mb-4">Repository Settings</h2>
      <div class="space-y-4">
        <div><label class="block text-sm font-medium text-gray-700">New Repo Name (to create)</label><input id="newRepoName" class="w-full border rounded-xl px-3 py-2" placeholder="new-repo"></div>
        <div><label class="block text-sm font-medium text-gray-700">Description</label><input id="repoDesc" class="w-full border rounded-xl px-3 py-2"></div>
        <div><label class="block text-sm font-medium text-gray-700">Visibility</label><select id="repoVis" class="border rounded-xl px-3 py-2"><option value="public">Public</option><option value="private">Private</option></select></div>
        <button id="createRepoBtn" class="bg-purple-600 text-white px-4 py-2 rounded-xl">Create Repository</button>
        <hr class="my-4">
        <div><label class="block text-sm font-medium text-gray-700">Default Branch</label><input id="defaultBranch" class="w-full border rounded-xl px-3 py-2" placeholder="main"></div>
        <button id="updateSettingsBtn" class="bg-yellow-500 text-white px-4 py-2 rounded-xl">Update Repository Settings</button>
        <div id="settingsStatus" class="mt-3 text-sm"></div>
      </div>`;
    }
    function initRepoSettingsTab() {
      document.getElementById('createRepoBtn').addEventListener('click', async () => {
        const creds = getCreds();
        if (!creds.token) return alert('Enter token');
        const name = document.getElementById('newRepoName').value.trim();
        const desc = document.getElementById('repoDesc').value.trim();
        const vis = document.getElementById('repoVis').value;
        if (!name) return alert('Repo name required');
        const res = await fetch('https://api.github.com/user/repos', {
          method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description: desc, private: vis === 'private' })
        });
        const data = await res.json();
        if (res.ok) { alert('Repo created: '+data.html_url); notify('Repository created'); }
        else alert('Error: '+data.message);
      });
      document.getElementById('updateSettingsBtn').addEventListener('click', async () => {
        const creds = getCreds();
        if (!creds.token) return alert('Enter token');
        const desc = document.getElementById('repoDesc').value.trim();
        const defBranch = document.getElementById('defaultBranch').value.trim();
        const body = {};
        if (desc) body.description = desc;
        if (defBranch) body.default_branch = defBranch;
        const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}`, {
          method: 'PATCH', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (res.ok) { document.getElementById('settingsStatus').innerHTML = 'Settings updated'; notify('Settings updated'); }
        else { const err = await res.json(); document.getElementById('settingsStatus').innerHTML = 'Error: '+err.message; }
      });
    }
  </script>
</body>
</html>
