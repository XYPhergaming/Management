<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Manager</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'monospace'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.25s ease-out',
                        'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                        'slide-down': 'slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                        'scale-in': 'scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-subtle': 'pulseSubtle 2s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.96)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        pulseSubtle: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.7' },
                        },
                    },
                },
            },
        };
    </script>

    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js">
    </script>

    <!-- JSZip for ZIP handling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>

    <!-- diff library -->
    <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js">
    </script>

    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-surface: #f8f8f8;
            --bg-surface-alt: #f0f0f0;
            --bg-hover: #ebebeb;
            --text-primary: #111111;
            --text-secondary: #555555;
            --text-tertiary: #888888;
            --border-subtle: #e5e5e5;
            --border-medium: #d4d4d4;
            --accent: #000000;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bbbbbb;
        }

        /* Sidebar link hover */
        .nav-item {
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
            border-left: 2px solid transparent;
        }
        .nav-item:hover {
            background-color: #ebebeb;
        }
        .nav-item.active {
            background-color: #e8e8e8;
            border-left-color: var(--accent);
        }
        .nav-item.active span {
            color: #111111;
            font-weight: 500;
        }

        /* Card hover */
        .card-hover {
            transition: all 0.25s ease;
            border: 1px solid #e5e5e5;
            background-color: #ffffff;
        }
        .card-hover:hover {
            border-color: #c0c0c0;
            background-color: #fafafa;
        }

        /* Button styles */
        .btn-primary {
            background-color: #000000;
            color: #ffffff;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-primary:hover {
            background-color: #1a1a1a;
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background-color: transparent;
            color: #111111;
            border: 1px solid #d4d4d4;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-secondary:hover {
            border-color: #999999;
            background-color: #f0f0f0;
        }
        .btn-secondary:active {
            transform: scale(0.97);
        }
        .btn-ghost {
            background: transparent;
            color: #555555;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-ghost:hover {
            color: #111111;
            background-color: #ebebeb;
        }

        /* Input styles */
        input[type="text"],
        input[type="password"],
        input[type="search"],
        textarea,
        select {
            background-color: #ffffff;
            border: 1px solid #d4d4d4;
            color: #111111;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="search"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #888888;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
        }
        input::placeholder,
        textarea::placeholder {
            color: #aaaaaa;
        }

        /* File input custom styling */
        input[type="file"] {
            color: #555555;
        }
        input[type="file"]::file-selector-button {
            background-color: #f0f0f0;
            color: #111111;
            border: 1px solid #d4d4d4;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            margin-right: 12px;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: #e0e0e0;
            border-color: #bbbbbb;
        }

        /* Drop zone */
        .drop-zone {
            transition: all 0.3s ease;
            border: 2px dashed #d4d4d4;
            background-color: #fafafa;
        }
        .drop-zone.drag-over {
            border-color: #888888;
            background-color: #f0f0f0;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            background: #ffffff;
            border: 1px solid #d4d4d4;
            color: #111111;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            max-width: 380px;
        }
        .toast.fade-out {
            animation: fadeOut 0.3s ease forwards;
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(8px);
            }
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-content {
            background: #ffffff;
            border: 1px solid #d4d4d4;
            border-radius: 16px;
            padding: 24px;
            max-width: 480px;
            width: 90%;
            animation: scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.12);
        }

        /* Tab content transition */
        .tab-content {
            animation: fadeIn 0.25s ease-out;
        }

        /* Bottom nav mobile */
        @media (max-width: 767px) {
            .sidebar-desktop {
                display: none;
            }
            .bottom-nav-mobile {
                display: flex;
            }
            .main-content {
                margin-left: 0;
                padding-bottom: 80px;
            }
        }
        @media (min-width: 768px) {
            .sidebar-desktop {
                display: flex;
            }
            .bottom-nav-mobile {
                display: none;
            }
            .main-content {
                margin-left: 240px;
            }
        }

        /* Horizontal scroll tabs (mobile) */
        .tabs-scroll {
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tabs-scroll::-webkit-scrollbar {
            display: none;
        }
        .tab-chip {
            white-space: nowrap;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .tab-chip.active {
            background-color: #000000;
            color: #ffffff;
            font-weight: 600;
        }

        /* Staged file list item */
        .staged-item {
            animation: slideUp 0.25s ease;
        }
    </style>
</head>

    <script>
        // ==================== THE COMPLETE JAVASCRIPT (UNCHANGED LOGIC) ====================
        (function() {
            let currentTab = 'push';
            let stagedChanges = [];
            let db = null;
            const DB_NAME = 'gh-manager-cache';
            const STORE_NAME = 'repoFiles';

            const tokenEl = document.getElementById('token');
            const ownerEl = document.getElementById('owner');
            const repoEl = document.getElementById('repo');
            const branchEl = document.getElementById('branch');
            const tabContent = document.getElementById('tabContent');
            const tabLabel = document.getElementById('currentTabLabel');

            function init() {
                loadCredentials();
                setupSidebarNav();
                setupMobileTabs();
                setupCredButtons();
                openIndexedDB();
                renderTab('push');
                requestNotificationPermission();
            }

            function loadCredentials() {
                const saved = JSON.parse(localStorage.getItem('ghCreds') || '{}');
                if (saved.token) tokenEl.value = saved.token;
                if (saved.owner) ownerEl.value = saved.owner;
                if (saved.repo) repoEl.value = saved.repo;
                if (saved.branch) branchEl.value = saved.branch || 'main';
            }

            function getCreds() {
                return {
                    token: tokenEl.value.trim(),
                    owner: ownerEl.value.trim(),
                    repo: repoEl.value.trim(),
                    branch: branchEl.value.trim() || 'main',
                };
            }

            function apiHeaders(token) {
                return { Authorization: `token ${token}` };
            }

            function requestNotificationPermission() {
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }

            function notify(msg) {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('GitHub Manager', { body: msg });
                }
                showToast(msg);
            }

            function showToast(msg, duration = 3000) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('fade-out');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }

            function openIndexedDB() {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains(STORE_NAME)) d.createObjectStore(STORE_NAME);
                };
                request.onsuccess = (e) => { db = e.target.result; };
                request.onerror = () => { console.warn('IndexedDB unavailable'); };
            }

            function setupSidebarNav() {
                document.querySelectorAll('#sidebarNav .nav-item').forEach(item => {
                    item.addEventListener('click', () => switchTab(item.dataset.tab));
                });
            }

            function setupMobileTabs() {
                document.querySelectorAll('#mobileTabScroller .tab-chip').forEach(chip => {
                    chip.addEventListener('click', () => switchTab(chip.dataset.tab));
                });
            }

            function setupCredButtons() {
                document.getElementById('saveCredsSidebar').addEventListener('click', saveCredentials);
                document.getElementById('saveCredsTop').addEventListener('click', saveCredentials);
                document.getElementById('clearCredsTop').addEventListener('click', clearCredentials);
            }

            function saveCredentials() {
                const creds = getCreds();
                localStorage.setItem('ghCreds', JSON.stringify(creds));
                showToast('Credentials saved', 2000);
            }

            function clearCredentials() {
                localStorage.removeItem('ghCreds');
                tokenEl.value = '';

            async function renderTab(tab) {
                const container = tabContent;
                container.style.opacity = '0';
                container.style.transform = 'translateY(8px)';
                container.style.transition = 'all 0.15s ease';
                let html = '';
                switch (tab) {
                    case 'push': html = pushTabHTML(); break;
                    case 'pull': html = pullTabHTML(); break;
                    case 'browse': html = browseTabHTML(); break;
                    case 'history': html = historyTabHTML(); break;
                    case 'branches': html = branchesTabHTML(); break;
                    case 'prs': html = prsTabHTML(); break;
                    case 'editor': html = editorTabHTML(); break;
                    case 'settings': html = settingsTabHTML(); break;
                    default: html = pushTabHTML();
                }
                container.innerHTML = html;
                void container.offsetWidth;
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
                switch (tab) {
                    case 'push': initPushTab(); break;
                    case 'pull': initPullTab(); break;
                    case 'browse': initBrowseTab(); break;
                    case 'history': initHistoryTab(); break;
                    case 'branches': initBranchesTab(); break;
                    case 'prs': initPRsTab(); break;
                    case 'editor': initEditorTab(); break;
                    case 'settings': initSettingsTab(); break;
                }
            }

            // Tab init functions (unchanged logic)
            function initPushTab() {
                const filesModeRadio = document.querySelector('input[value="files"]');
                const zipModeRadio = document.querySelector('input[value="zip"]');
                const filesArea = document.getElementById('pushFilesArea');
                const zipArea = document.getElementById('pushZipArea');
                const dropZone = document.getElementById('dropZone');
                const fileInput = document.getElementById('fileInput');
                const zipInput = document.getElementById('zipInput');
                const pushBtn = document.getElementById('pushBtn');
                const statusDiv = document.getElementById('pushStatus');

                filesModeRadio.addEventListener('change', () => { filesArea.classList.remove('hidden'); zipArea.classList.add('hidden'); });
                zipModeRadio.addEventListener('change', () => { filesArea.classList.add('hidden'); zipArea.classList.remove('hidden'); });

                dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
                dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('drag-over');
                    if (zipModeRadio.checked && e.dataTransfer.files.length) zipInput.files = e.dataTransfer.files;
                    else if (e.dataTransfer.files.length) fileInput.files = e.dataTransfer.files;
                });
                dropZone.addEventListener('click', () => {
                    if (zipModeRadio.checked) zipInput.click();
                    else fileInput.click();
                });

                async function fileToBase64(file) {
                    const buf = await file.arrayBuffer();
                    const bytes = new Uint8Array(buf);
                    let binary = '';
                    bytes.forEach(b => binary += String.fromCharCode(b));
                    return btoa(binary);
                }
                async function processZip(zipFile, stripRoot) {
                    const zip = await JSZip.loadAsync(zipFile);
                    const files = [];
                    let rootPrefix = null;
                    if (stripRoot) {
                        zip.forEach((path, entry) => {
                            if (entry.dir) return;
                            const parts = path.split('/');
                            if (parts.length > 1) {
                                const candidate = parts[0] + '/';
                                if (!rootPrefix) rootPrefix = candidate;
                                else if (rootPrefix !== candidate) rootPrefix = null;
                            } else rootPrefix = null;
                        });
                    }
                    const promises = [];
                    zip.forEach((path, entry) => {
                        if (entry.dir) return;
                        let finalPath = path;
                        if (rootPrefix && finalPath.startsWith(rootPrefix)) {
                            finalPath = finalPath.substring(rootPrefix.length);
                            if (finalPath.startsWith('/')) finalPath = finalPath.substring(1);
                        }
                        promises.push(entry.async('uint8array').then(data => {
                            let binary = '';
                            data.forEach(b => binary += String.fromCharCode(b));
                            files.push({ path: finalPath, contentBase64: btoa(binary) });
                        }));
                    });
                    await Promise.all(promises);
                    return files;
                }

                pushBtn.addEventListener('click', async () => {
                    const creds = getCreds();
                    if (!creds.token || !creds.owner || !creds.repo) {
                        statusDiv.textContent = 'Please fill in all credential fields.';
                        statusDiv.className = 'text-sm text-center text-red-600 min-h-[20px]';
                        return;
                    }
                    const message = document.getElementById('commitMsg').value.trim() || 'Web push commit';
                    const isZip = zipModeRadio.checked;
                    let filesToPush = [];
                    try {
                        if (isZip) {
                            if (!zipInput.files[0]) { statusDiv.textContent = 'Select a ZIP file.'; statusDiv.className = 'text-sm text-center text-red-600 min-h-[20px]'; return; }
                            filesToPush = await processZip(zipInput.files[0], document.getElementById('stripRoot').checked);
                        } else {
                            if (!fileInput.files.length) { statusDiv.textContent = 'Select at least one file.'; statusDiv.className = 'text-sm text-center text-red-600 min-h-[20px]'; return; }
                            for (const f of fileInput.files) filesToPush.push({ path: f.name, contentBase64: await fileToBase64(f) });
                        }
                        if (!filesToPush.length) { statusDiv.textContent = 'No files to push.'; statusDiv.className = 'text-sm text-center text-red-600 min-h-[20px]'; return; }
                        statusDiv.textContent = 'Pushing...';
                        statusDiv.className = 'text-sm text-center text-[#555555] min-h-[20px] animate-pulse-subtle';
                        pushBtn.disabled = true;
                        const { token, owner, repo, branch } = creds;
                        let baseSha = null, emptyRepo = false;
                        const refUrl = `https://api.github.com/repos/${owner}/${repo}/git/ref/heads/${branch}`;
                        const refRes = await fetch(refUrl, { headers: apiHeaders(token) });
                        if (refRes.ok) { const d = await refRes.json(); baseSha = d.object.sha; }
                        else {
                            const err = await refRes.json().catch(() => ({}));
                            if (refRes.status === 409 && err.message?.includes('empty')) emptyRepo = true;
                            else if (refRes.status === 404) {
                                const headsRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads`, { headers: apiHeaders(token) });
                                if (!headsRes.ok) throw new Error('Failed to list branches');
                                const heads = await headsRes.json();
                                if (!heads.length) emptyRepo = true;
                                else throw new Error(`Branch "${branch}" not found. Available: ${heads.map(h=>h.ref.replace('refs/heads/','')).join(', ')}`);
                            } else throw new Error(err.message || 'Branch fetch failed');
                        }
                        const blobs = [];
                        for (const f of filesToPush) {
                            const blobRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/blobs`, {
                                method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                                body: JSON.stringify({ content: f.contentBase64, encoding: 'base64' })
                            });
                            if (!blobRes.ok) throw new Error(`Blob failed for ${f.path}`);
                            blobs.push({ path: f.path, sha: (await blobRes.json()).sha });
                        }
                        const treeItems = blobs.map(b => ({ path: b.path, mode: '100644', type: 'blob', sha: b.sha }));
                        const treeBody = { tree: treeItems }; if (!emptyRepo) treeBody.base_tree = baseSha;
                        const treeRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees`, {
                            method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' }, body: JSON.stringify(treeBody)
                        });
                        if (!treeRes.ok) throw new Error('Tree creation failed');
                        const treeSha = (await treeRes.json()).sha;
                        const commitRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/commits`, {
                            method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message, tree: treeSha, parents: emptyRepo ? [] : [baseSha] })
                        });
                        if (!commitRes.ok) throw new Error('Commit failed');
                        const commitSha = (await commitRes.json()).sha;
                        if (emptyRepo) {
                            await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs`, {
                                method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                                body: JSON.stringify({ ref: `refs/heads/${branch}`, sha: commitSha })
                            });
                        } else {
                            await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/${branch}`, {
                                method: 'PATCH', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                                body: JSON.stringify({ sha: commitSha })
                            });
                        }
                        statusDiv.textContent = `Successfully pushed ${blobs.length} file(s) to "${branch}".`;
                        statusDiv.className = 'text-sm text-center text-green-600 min-h-[20px]';
                        notify('Push successful');
                    } catch (err) {
                        statusDiv.textContent = `Error: ${err.message}`;
                        statusDiv.className = 'text-sm text-center text-red-600 min-h-[20px]';
                    } finally { pushBtn.disabled = false; }
                });
            }

            function initPullTab() {
                document.getElementById('pullBtn').addEventListener('click', async () => {
                    const creds = getCreds();
                    if (!creds.token || !creds.owner || !creds.repo) {
                        document.getElementById('pullStatus').textContent = 'Please fill in all credential fields.';
                        document.getElementById('pullStatus').className = 'text-sm text-center text-red-600 min-h-[20px]'; return;
                    }
                    const statusDiv = document.getElementById('pullStatus');
                    statusDiv.textContent = 'Downloading...'; statusDiv.className = 'text-sm text-center text-[#555555] min-h-[20px] animate-pulse-subtle';
                    try {
                        const url = `https://api.github.com/repos/${creds.owner}/${creds.repo}/zipball/${creds.branch}`;
                        const res = await fetch(url, { headers: apiHeaders(creds.token) });
                        if (!res.ok) throw new Error('Download failed');
                        const blob = await res.blob();
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `${creds.repo}-${creds.branch}.zip`;
                        document.body.appendChild(a); a.click(); a.remove();
                        URL.revokeObjectURL(a.href);
                        statusDiv.textContent = 'Download started.';
                        statusDiv.className = 'text-sm text-center text-green-600 min-h-[20px]';
                        notify('Pull successful');
                    } catch (err) {
                        statusDiv.textContent = `Error: ${err.message}`;
                        statusDiv.className = 'text-sm text-center text-red-600 min-h-[20px]';
                    }
                });
            }

            async function initBrowseTab() {
                const creds = getCreds();
                if (!creds.token || !creds.owner || !creds.repo) {
                    document.getElementById('fileList').innerHTML = '<p class="text-sm text-[#555555] p-4">Please fill in credentials above.</p>'; return;
                }
                let currentPath = '';
                const { owner, repo, branch, token } = creds;
                async function loadTree(path = '') {
                    const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
                    const res = await fetch(url, { headers: apiHeaders(token) });
                    if (!res.ok) { document.getElementById('fileList').innerHTML = '<p class="text-sm text-red-600 p-4">Failed to load tree.</p>'; return; }
                    const data = await res.json();
                    const items = data.tree.filter(item => {
                        if (!path) return !item.path.includes('/');
                        return item.path.startsWith(path + '/') && item.path.split('/').length === path.split('/').length + 1;
                    }).map(item => ({
                        name: path ? item.path.substring(path.length + 1) : item.path,
                        fullPath: item.path,
                        type: item.type,
                    }));
                    renderFileList(items, path);
                    if (db) {
                        try {
                            const tx = db.transaction(STORE_NAME, 'readwrite');
                            tx.objectStore(STORE_NAME).put(JSON.stringify(items), `tree_${path || 'root'}`);
                        } catch (e) {}
                    }
                }
                function renderFileList(items, path) {
                    const container = document.getElementById('fileList');
                    if (!items.length) container.innerHTML = '<p class="text-sm text-[#888888] p-3">This directory is empty.</p>';
                    else {
                        container.innerHTML = items.map(item => `
                        <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all hover:bg-gray-100 group" data-path="${item.fullPath}" data-type="${item.type}">
                            <span class="text-xs font-mono text-[#888888] w-5">${item.type==='tree'?'[D]':'[F]'}</span>
                            <span class="text-sm text-black group-hover:text-black flex-1 truncate">${item.name}</span>
                            <span class="text-xs text-[#aaaaaa] opacity-0 group-hover:opacity-100 transition-opacity">${item.type==='tree'?'Open':'View'}</span>
                        </div>`).join('');
                    }
                    const breadcrumb = document.getElementById('breadcrumb');
                    if (!path) breadcrumb.innerHTML = '<span class="text-black font-medium">Root</span>';
                    else {
                        const parts = path.split('/');
                        let cumPath = '';
                        breadcrumb.innerHTML = '<span class="cursor-pointer text-[#555555] hover:text-black transition-colors" data-nav="">Root</span>';
                        parts.forEach((p, i) => {
                            cumPath += (i > 0 ? '/' : '') + p;
                            breadcrumb.innerHTML += ` <span class="text-[#aaaaaa]">/</span> <span class="cursor-pointer text-[#555555] hover:text-black transition-colors" data-nav="${cumPath}">${p}</span>`;
                        });
                    }
                    document.querySelectorAll('#fileList div[data-path]').forEach(el => {
                        el.addEventListener('click', async () => {
                            const fp = el.dataset.path;
                            if (el.dataset.type === 'tree') { currentPath = fp; loadTree(fp); }
                            else await viewFile(fp);
                        });
                    });
                    document.querySelectorAll('#breadcrumb span[data-nav]').forEach(el => {
                        el.addEventListener('click', () => { currentPath = el.dataset.nav || ''; loadTree(currentPath); });
                    });
                }
                async function viewFile(filePath) {
                    const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}?ref=${branch}`;
                    const fileRes = await fetch(fileUrl, { headers: apiHeaders(token) });
                    if (!fileRes.ok) { showToast('Failed to load file'); return; }
                    const fileData = await fileRes.json();
                    const content = atob(fileData.content);
                    const viewer = document.getElementById('fileContentViewer');
                    viewer.classList.remove('hidden'); viewer.style.animation = 'slideUp 0.3s cubic-bezier(0.16,1,0.3,1)';
                    const codeView = document.getElementById('codeView');
                    codeView.textContent = content; codeView.className = 'text-sm font-mono';
                    if (typeof hljs !== 'undefined') { try { hljs.highlightElement(codeView); } catch (e) {} }
                    document.getElementById('editFileFromBrowse').onclick = () => {
                        switchTab('editor');
                        setTimeout(() => {
                            const ep = document.getElementById('editorFilePath'); if (ep) ep.value = filePath;
                            const ec = document.getElementById('editorContent'); if (ec) ec.value = content;
                        }, 300);
                    };
                    document.getElementById('deleteFileFromBrowse').onclick = async () => {
                        if (!confirm(`Delete "${filePath}"?`)) return;
                        const delUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
                        const delRes = await fetch(delUrl, { headers: apiHeaders(token) });
                        const delData = await delRes.json();
                        const delResult = await fetch(delUrl, {
                            method: 'DELETE', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `Delete ${filePath}`, sha: delData.sha, branch })
                        });
                        if (delResult.ok) { showToast('File deleted'); notify('File deleted'); viewer.classList.add('hidden'); loadTree(currentPath); }
                        else showToast('Delete failed');
                    };
                }
                document.getElementById('breadcrumb').addEventListener('click', (e) => {
                    if (e.target.dataset.nav !== undefined) { currentPath = e.target.dataset.nav || ''; loadTree(currentPath); }
                });
                loadTree('');
            }

            async function initHistoryTab() {
                const creds = getCreds();
                if (!creds.token || !creds.owner || !creds.repo) {
                    document.getElementById('commitList').innerHTML = '<p class="text-sm text-[#555555] p-4">Please fill in credentials above.</p>'; return;
                }
                const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/commits?sha=${creds.branch}&per_page=25`, { headers: apiHeaders(creds.token) });
                if (!res.ok) { document.getElementById('commitList').innerHTML = '<p class="text-sm text-red-600 p-4">Failed to load commits.</p>'; return; }
                const commits = await res.json();
                document.getElementById('commitList').innerHTML = commits.map(c => `
                <div class="p-4 rounded-xl cursor-pointer transition-all hover:bg-gray-100 border border-[#e5e5e5] hover:border-[#aaaaaa] commit-item" data-sha="${c.sha}">
                    <div class="font-medium text-black text-sm">${escapeHTML(c.commit.message.split('\n')[0])}</div>
                    <div class="flex items-center gap-3 mt-1.5 text-xs text-[#888888]">
                        <span>${c.sha.substring(0,8)}</span>
                        <span>${c.commit.author?.name||'Unknown'}</span>
                        <span>${new Date(c.commit.author?.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
                    </div>
                </div>`).join('');
                document.querySelectorAll('.commit-item').forEach(el => {
                    el.addEventListener('click', async () => {
                        const sha = el.dataset.sha;
                        const diffRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/commits/${sha}`, { headers: apiHeaders(creds.token) });
                        const commitData = await diffRes.json();
                        const files = commitData.files || [];
                        let diffText = '';
                        files.forEach(f => diffText += `\n--- ${f.filename} (${f.additions||0}+ / ${f.deletions||0}-)\n${f.patch||'Binary file - no diff available'}\n`);
                        const viewer = document.getElementById('diffViewer');
                        viewer.classList.remove('hidden'); viewer.style.animation = 'slideUp 0.3s cubic-bezier(0.16,1,0.3,1)';
                        document.getElementById('diffOutput').textContent = diffText || 'No file changes in this commit.';
                    });
                });
            }
            function escapeHTML(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

            async function initBranchesTab() {
                const creds = getCreds();
                if (!creds.token || !creds.owner || !creds.repo) {
                    document.getElementById('branchList').innerHTML = '<p class="text-sm text-[#555555] p-4">Please fill in credentials above.</p>'; return;
                }
                async function loadBranches() {
                    const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/branches`, { headers: apiHeaders(creds.token) });
                    if (!res.ok) { document.getElementById('branchList').innerHTML = '<p class="text-sm text-red-600 p-4">Failed to load branches.</p>'; return; }
                    const branches = await res.json();
                    document.getElementById('branchList').innerHTML = branches.map(b => `
                    <div class="flex justify-between items-center p-3 rounded-xl transition-all hover:bg-gray-100 border border-transparent hover:border-[#e5e5e5]">
                        <span class="text-sm text-black font-medium">${b.name}</span>
                        <button class="text-xs text-[#888888] hover:text-red-600 transition-colors delete-branch-btn" data-name="${b.name}">Delete</button>
                    </div>`).join('');
                    document.querySelectorAll('.delete-branch-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            if (!confirm(`Delete branch "${btn.dataset.name}"?`)) return;
                            await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/refs/heads/${btn.dataset.name}`, { method: 'DELETE', headers: apiHeaders(creds.token) });
                            showToast(`Branch "${btn.dataset.name}" deleted`); notify('Branch deleted'); loadBranches();
                        });
                    });
                }
                loadBranches();
                document.getElementById('createBranchBtn').addEventListener('click', async () => {
                    const name = document.getElementById('newBranchName').value.trim();
                    if (!name) { showToast('Enter a branch name'); return; }
                    const refRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/ref/heads/${creds.branch}`, { headers: apiHeaders(creds.token) });
                    if (!refRes.ok) { showToast('Failed to get base branch ref'); return; }
                    const refData = await refRes.json();
                    const createRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/refs`, {
                        method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ref: `refs/heads/${name}`, sha: refData.object.sha })
                    });
                    if (createRes.ok) { showToast(`Branch "${name}" created`); notify('Branch created'); document.getElementById('newBranchName').value = ''; loadBranches(); }
                    else { const err = await createRes.json(); showToast(`Error: ${err.message}`); }
                });
            }

            async function initPRsTab() {
                const creds = getCreds();
                if (!creds.token || !creds.owner || !creds.repo) {
                    document.getElementById('prList').innerHTML = '<p class="text-sm text-[#555555] p-4">Please fill in credentials above.</p>'; return;
                }
                async function loadPRs() {
                    const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/pulls?state=open`, { headers: apiHeaders(creds.token) });
                    if (!res.ok) { document.getElementById('prList').innerHTML = '<p class="text-sm text-red-600 p-4">Failed to load PRs.</p>'; return; }
                    const prs = await res.json();
                    if (!prs.length) document.getElementById('prList').innerHTML = '<p class="text-sm text-[#888888] p-4">No open pull requests.</p>';
                    else {
                        document.getElementById('prList').innerHTML = prs.map(pr => `
                        <div class="p-4 rounded-xl border border-[#e5e5e5] transition-all hover:border-[#aaaaaa]">
                            <div class="flex justify-between items-start gap-3">
                                <div><span class="text-sm font-medium text-black">#${pr.number}</span> <span class="text-sm text-black ml-2">${escapeHTML(pr.title)}</span></div>
                                <button class="text-xs text-[#888888] hover:text-green-600 transition-colors merge-pr-btn whitespace-nowrap" data-number="${pr.number}">Merge</button>
                            </div>
                            <div class="text-xs text-[#888888] mt-1">${pr.head.label} → ${pr.base.label}</div>
                        </div>`).join('');
                    }
                    document.querySelectorAll('.merge-pr-btn').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const num = btn.dataset.number;
                            const mergeRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/pulls/${num}/merge`, {
                                method: 'PUT', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' }, body: JSON.stringify({})
                            });
                            if (mergeRes.ok) { showToast(`PR #${num} merged`); notify('PR merged'); loadPRs(); }
                            else { const err = await mergeRes.json(); showToast(`Merge failed: ${err.message}`); }
                        });
                    });
                }
                loadPRs();
                document.getElementById('createPRBtn').addEventListener('click', async () => {
                    const title = prompt('Pull request title:'); if (!title) return;
                    const baseBranch = prompt('Base branch (default: main):', 'main') || 'main';
                    const createRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/pulls`, {
                        method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, head: creds.branch, base: baseBranch })
                    });
                    if (createRes.ok) { const prData = await createRes.json(); showToast(`PR #${prData.number} created`); notify('PR created'); loadPRs(); }
                    else { const err = await createRes.json(); showToast(`Error: ${err.message}`); }
                });
            }

            function initEditorTab() {
                function renderStaged() {
                    const list = document.getElementById('stagedList'); if (!list) return;
                    if (!stagedChanges.length) list.innerHTML = '<p class="text-xs text-[#888888] p-3 text-center">No changes staged. Edit a file and click "Stage Change".</p>';
                    else {
                        list.innerHTML = stagedChanges.map((c, i) => `
                        <div class="staged-item flex justify-between items-center p-3 rounded-xl bg-[#fafafa] border border-[#e5e5e5]">
                            <div><span class="text-xs font-medium text-black">${escapeHTML(c.path)}</span> <span class="text-xs text-[#888888] ml-2">(${c.action})</span></div>
                            <button class="text-xs text-[#888888] hover:text-red-600 transition-colors remove-staged" data-index="${i}">Remove</button>
                        </div>`).join('');
                    }
                    document.querySelectorAll('.remove-staged').forEach(btn => {
                        btn.addEventListener('click', () => { stagedChanges.splice(parseInt(btn.dataset.index), 1); renderStaged(); });
                    });
                }
                document.getElementById('stageChangeBtn').addEventListener('click', () => {
                    const path = document.getElementById('editorFilePath').value.trim();
                    const content = document.getElementById('editorContent').value;
                    if (!path) { showToast('Enter a file path'); return; }
                    stagedChanges.push({ path, content, action: 'edit' }); renderStaged(); showToast(`Staged: ${path}`);
                });
                document.getElementById('commitStagedBtn').addEventListener('click', async () => {
                    if (!stagedChanges.length) { showToast('No changes staged'); return; }
                    const creds = getCreds();
                    if (!creds.token || !creds.owner || !creds.repo) { showToast('Please fill in credentials'); return; }
                    const message = prompt('Commit message:', 'Multi-file edit via GitHub Manager') || 'Multi-file edit';
                    try {
                        const blobs = [];
                        for (const change of stagedChanges) {
                            if (change.action === 'edit' || change.action === 'add') {
                                const contentBase64 = btoa(unescape(encodeURIComponent(change.content)));
                                const blobRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/blobs`, {
                                    method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ content: contentBase64, encoding: 'base64' })
                                });
                                if (!blobRes.ok) throw new Error(`Blob failed for ${change.path}`);
                                blobs.push({ path: change.path, sha: (await blobRes.json()).sha });
                            }
                        }
                        const baseRefRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/ref/heads/${creds.branch}`, { headers: apiHeaders(creds.token) });
                        const baseSha = (await baseRefRes.json()).object.sha;
                        const treeItems = blobs.map(b => ({ path: b.path, mode: '100644', type: 'blob', sha: b.sha }));
                        const treeRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/trees`, {
                            method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ base_tree: baseSha, tree: treeItems })
                        });
                        if (!treeRes.ok) throw new Error('Tree creation failed');
                        const treeSha = (await treeRes.json()).sha;
                        const commitRes = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/commits`, {
                            method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message, tree: treeSha, parents: [baseSha] })
                        });
                        if (!commitRes.ok) throw new Error('Commit failed');
                        const commitSha = (await commitRes.json()).sha;
                        await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/git/refs/heads/${creds.branch}`, {
                            method: 'PATCH', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sha: commitSha })
                        });
                        stagedChanges = []; renderStaged(); showToast('Commit successful'); notify('Multi-file commit done');
                    } catch (err) { showToast(`Error: ${err.message}`); }
                });
                document.getElementById('clearStagedBtn').addEventListener('click', () => { stagedChanges = []; renderStaged(); showToast('Staging cleared'); });
                renderStaged();
            }

            function initSettingsTab() {
                document.getElementById('createRepoBtn').addEventListener('click', async () => {
                    const creds = getCreds(); if (!creds.token) { showToast('Please enter a token'); return; }
                    const name = document.getElementById('newRepoName').value.trim();
                    const desc = document.getElementById('newRepoDesc').value.trim();
                    const vis = document.getElementById('newRepoVis').value;
                    if (!name) { showToast('Repository name required'); return; }
                    const res = await fetch('https://api.github.com/user/repos', {
                        method: 'POST', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, description: desc, private: vis === 'private' })
                    });
                    const data = await res.json();
                    if (res.ok) { showToast(`Repository "${name}" created`); notify('Repository created'); document.getElementById('newRepoName').value = ''; document.getElementById('newRepoDesc').value = ''; }
                    else showToast(`Error: ${data.message}`);
                });
                document.getElementById('updateSettingsBtn').addEventListener('click', async () => {
                    const creds = getCreds();
                    if (!creds.token || !creds.owner || !creds.repo) {
                        document.getElementById('settingsStatus').textContent = 'Please fill in all credential fields.';
                        document.getElementById('settingsStatus').className = 'text-sm text-center text-red-600 min-h-[20px]'; return;
                    }
                    const desc = document.getElementById('updateRepoDesc').value.trim();
                    const defBranch = document.getElementById('updateDefaultBranch').value.trim();
                    const body = {}; if (desc) body.description = desc; if (defBranch) body.default_branch = defBranch;
                    if (!Object.keys(body).length) { showToast('Nothing to update'); return; }
                    const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}`, {
                        method: 'PATCH', headers: { ...apiHeaders(creds.token), 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                    });
                    const statusDiv = document.getElementById('settingsStatus');
                    if (res.ok) { statusDiv.textContent = 'Settings updated successfully.'; statusDiv.className = 'text-sm text-center text-green-600 min-h-[20px]'; notify('Settings updated'); }
                    else { const err = await res.json(); statusDiv.textContent = `Error: ${err.message}`; statusDiv.className = 'text-sm text-center text-red-600 min-h-[20px]'; }
                });
            }

            window.openFileInEditor = function(path, content) {
                switchTab('editor');
                setTimeout(() => {
                    const ep = document.getElementById('editorFilePath'); if (ep) ep.value = path;
                    const ec = document.getElementById('editorContent'); if (ec) ec.value = content;
                }, 350);
            };

            init();
        })();
    </script>
</body>
</html>
