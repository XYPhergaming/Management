<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Manager</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.25s ease-out',
                        'fade-in-up': 'fadeInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1)',
                        'fade-in-left': 'fadeInLeft 0.3s ease-out',
                        'fade-in-right': 'fadeInRight 0.3s ease-out',
                        'scale-in': 'scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-subtle': 'pulseSubtle 2s ease-in-out infinite',
                        'bounce-in': 'bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55)',
                        'stagger': 'stagger 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeInLeft: { '0%': { opacity: '0', transform: 'translateX(-15px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        fadeInRight: { '0%': { opacity: '0', transform: 'translateX(15px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                        pulseSubtle: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.75' } },
                        bounceIn: { '0%': { opacity: '0', transform: 'scale(0.3)' }, '50%': { opacity: '1', transform: 'scale(1.05)' }, '70%': { transform: 'scale(0.9)' }, '100%': { transform: 'scale(1)' } },
                        stagger: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    },
                },
            },
        };
    </script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- diff -->
    <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>

    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-surface: #f8f8f8;
            --bg-hover: #f0f0f0;
            --text-primary: #111111;
            --text-secondary: #555555;
            --text-tertiary: #888888;
            --border-subtle: #e5e5e5;
            --border-medium: #d4d4d4;
            --accent: #000000;
        }
        * { -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #bbbbbb; }

        .nav-item {
            position: relative; transition: all 0.2s ease; cursor: pointer;
            border-left: 2px solid transparent;
        }
        .nav-item:hover { background-color: #ebebeb; transform: translateX(4px); }
        .nav-item.active { background-color: #e8e8e8; border-left-color: var(--accent); }
        .nav-item.active span { color: #111111; font-weight: 500; }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            border: 1px solid #e5e5e5; background: #ffffff; box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .card-hover:hover {
            border-color: #c0c0c0; background-color: #fafafa;
            transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .btn-primary {
            background-color: #000000; color: #ffffff; font-weight: 600;
            transition: all 0.2s ease; cursor: pointer; position: relative; overflow: hidden;
        }
        .btn-primary:hover { background-color: #1a1a1a; transform: translateY(-1px); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-secondary {
            background: transparent; color: #111111; border: 1px solid #d4d4d4;
            font-weight: 500; transition: all 0.2s ease; cursor: pointer; position: relative; overflow: hidden;
        }
        .btn-secondary:hover { border-color: #999999; background-color: #f0f0f0; }
        .btn-secondary:active { transform: scale(0.97); }
        .btn-ghost {
            background: transparent; color: #555555; transition: all 0.2s ease; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .btn-ghost:hover { color: #111111; background-color: #ebebeb; }

        input[type="text"], input[type="password"], input[type="search"], textarea, select {
            background-color: #ffffff; border: 1px solid #d4d4d4; color: #111111;
            transition: all 0.2s ease; font-family: 'Inter', sans-serif;
        }
        input:focus, textarea:focus, select:focus {
            outline: none; border-color: #888888; box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
        }
        input::placeholder, textarea::placeholder { color: #aaaaaa; }

        input[type="file"]::file-selector-button {
            background: #f0f0f0; color: #111111; border: 1px solid #d4d4d4;
            border-radius: 8px; padding: 8px 16px; cursor: pointer; transition: 0.2s;
            font-family: 'Inter', sans-serif; font-weight: 500; margin-right: 12px;
        }
        input[type="file"]::file-selector-button:hover { background: #e0e0e0; border-color: #bbbbbb; }

        .drop-zone {
            transition: all 0.3s ease; border: 2px dashed #d4d4d4;
            background: #fafafa; cursor: pointer;
        }
        .drop-zone.drag-over {
            border-color: #888888; background: #f0f0f0;
            animation: pulseBorder 1s infinite;
        }
        @keyframes pulseBorder {
            0% { border-color: #888888; } 50% { border-color: #bbbbbb; } 100% { border-color: #888888; }
        }

        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            background: #ffffff; border: 1px solid #d4d4d4; color: #111111;
            padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); max-width: 380px;
        }
        .toast.fade-out { animation: fadeOut 0.3s ease forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(8px); } }

        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.4); transform: scale(0);
            animation: ripple-anim 0.6s linear; pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        .tab-content { animation: fadeInUp 0.35s ease; }

        .tabs-scroll { -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .tabs-scroll::-webkit-scrollbar { display: none; }
        .tab-chip {
            white-space: nowrap; transition: all 0.2s ease; flex-shrink: 0;
        }
        .tab-chip.active {
            background-color: #000000; color: #ffffff; font-weight: 600; transform: scale(1.05);
        }

        .stagger-item { opacity: 0; animation: stagger 0.3s ease-out forwards; }

        @media (max-width: 767px) {
            .sidebar-desktop { display: none; }
            .main-content { margin-left: 0; padding-bottom: 80px; }
        }
        @media (min-width: 768px) {
            .sidebar-desktop { display: flex; }
            .main-content { margin-left: 240px; }
        }
    </style>
</head>
<body class="bg-white text-black antialiased">

<!-- Desktop Sidebar -->

<main class="main-content min-h-screen transition-all duration-300 bg-white" id="mainContent">

            <div class="hidden md:block">
                <span class="text-sm text-[#888888]" id="currentTabLabel">Push</span>

            <div class="flex items-center gap-2">
                <button id="saveCredsTop" class="btn-ghost text-xs px-3 py-1.5 rounded-lg">Save</button>

            <span class="tab-chip px-4 py-1.5 rounded-full text-xs cursor-pointer text-[#555555] bg-white border border-[#d4d4d4]" data-tab="browse">Browse</span>

<div id="toastContainer"></div>

<script>
    (function() {
        let currentTab = 'push';
        let stagedChanges = [];
        let db = null;
        const DB_NAME = 'gh-manager-cache';
        const STORE_NAME = 'repoFiles';

        const tokenEl = document.getElementById('token');
        const ownerEl = document.getElementById('owner');
        const repoEl = document.getElementById('repo');
        const branchEl = document.getElementById('branch');
        const tabContent = document.getElementById('tabContent');
        const tabLabel = document.getElementById('currentTabLabel');

        function loadCredentials() {
            const saved = JSON.parse(localStorage.getItem('ghCreds') || '{}');
            if (saved.token) tokenEl.value = saved.token;
            if (saved.owner) ownerEl.value = saved.owner;
            if (saved.repo) repoEl.value = saved.repo;
            if (saved.branch) branchEl.value = saved.branch || 'main';
        }

        function getCreds() {
            return {
                token: tokenEl.value.trim(),
                owner: ownerEl.value.trim(),
                repo: repoEl.value.trim(),
                branch: branchEl.value.trim() || 'main',
            };
        }

        function apiHeaders(token) { return { Authorization: `token ${token}` }; }

        function notify(msg) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('GitHub Manager', { body: msg });
            }
            showToast(msg);
        }

        function showToast(msg, duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function openIndexedDB() {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains(STORE_NAME)) d.createObjectStore(STORE_NAME);
            };
            request.onsuccess = (e) => { db = e.target.result; };
            request.onerror = () => {};
        }

        function saveCredentials() {
            localStorage.setItem('ghCreds', JSON.stringify(getCreds()));
            showToast('Credentials saved');
        }

        function clearCredentials() {
            localStorage.removeItem('ghCreds');
            tokenEl.value = ''; ownerEl.value = ''; repoEl.value = ''; branchEl.value = 'main';
            showToast('Credentials cleared');
        }

        document.addEventListener('click', function(e) {
            const target = e.target.closest('.btn-primary, .btn-secondary, .btn-ghost');
            if (!target) return;
            const rect = target.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            target.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });

        function setupNav() {
            document.querySelectorAll('#sidebarNav .nav-item').forEach(item => {
                item.addEventListener('click', () => switchTab(item.dataset.tab));
            });
            document.querySelectorAll('#mobileTabScroller .tab-chip').forEach(chip => {
                chip.addEventListener('click', () => switchTab(chip.dataset.tab));
            });
            document.getElementById('saveCredsSidebar').addEventListener('click', saveCredentials);
            document.getElementById('saveCredsTop').addEventListener('click', saveCredentials);
            document.getElementById('clearCredsTop').addEventListener('click', clearCredentials);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('#sidebarNav .nav-item').forEach(el => el.classList.remove('active'));
            const sidebarItem = document.querySelector(`#sidebarNav .nav-item[data-tab="${tab}"]`);
            if (sidebarItem) sidebarItem.classList.add('active');
            document.querySelectorAll('#mobileTabScroller .tab-chip').forEach(el => {
                el.classList.remove('active', 'bg-black', 'text-white', 'font-semibold');
                el.classList.add('text-[#555555]', 'bg-white', 'border', 'border-[#d4d4d4]');
            });
            const mobileChip = document.querySelector(`#mobileTabScroller .tab-chip[data-tab="${tab}"]`);
            if (mobileChip) {
                mobileChip.classList.add('active', 'bg-black', 'text-white', 'font-semibold');
                mobileChip.classList.remove('text-[#555555]', 'bg-white', 'border', 'border-[#d4d4d4]');
                mobileChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            const labels = { push:'Push', pull:'Pull', browse:'Browse Files', history:'Commit History', branches:'Branches', prs:'Pull Requests', editor:'Editor', settings:'Settings' };
            if (tabLabel) tabLabel.textContent = labels[tab] || tab;
            renderTab(tab);
        }

        async function renderTab(tab) {
            const container = tabContent;
            container.style.opacity = '0';
            container.style.transform = 'translateY(12px)';
            container.style.transition = 'all 0.15s ease';
            let html = '';
            switch (tab) {
                case 'push': html = pushTabHTML(); break;
                case 'pull': html = pullTabHTML(); break;
                case 'browse': html = browseTabHTML(); break;
                case 'history': html = historyTabHTML(); break;
                case 'branches': html = branchesTabHTML(); break;
                case 'prs': html = prsTabHTML(); break;
                case 'editor': html = editorTabHTML(); break;
                case 'settings': html = settingsTabHTML(); break;
            }
            container.innerHTML = html;
            void container.offsetWidth;
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
            container.classList.add('tab-content');
            switch (tab) {
                case 'push': initPushTab(); break;
                case 'pull': initPullTab(); break;
                case 'browse': initBrowseTab(); break;
                case 'history': initHistoryTab(); break;
                case 'branches': initBranchesTab(); break;
                case 'prs': initPRsTab(); break;
                case 'editor': initEditorTab(); break;
                case 'settings': initSettingsTab(); break;
            }
        }

        // ---------- HELPERS ----------
        async function fileToBase64(file) {
            const buf = await file.arrayBuffer();
            const bytes = new Uint8Array(buf);
            let binary = ''; bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
        }

        async function processZip(zipFile, stripRoot) {
            const zip = await JSZip.loadAsync(zipFile);
            const files = [];
            let rootPrefix = null;
            if (stripRoot) {
                zip.forEach((path, entry) => {
                    if (entry.dir) return;
                    const parts = path.split('/');
                    if (parts.length > 1) {
                        const candidate = parts[0] + '/';
                        if (!rootPrefix) rootPrefix = candidate;
                        else if (rootPrefix !== candidate) rootPrefix = null;
                    } else rootPrefix = null;
                });
            }
            const promises = [];
            zip.forEach((relativePath, entry) => {
                if (entry.dir) return;
                let finalPath = relativePath;
                if (rootPrefix && finalPath.startsWith(rootPrefix)) {
                    finalPath = finalPath.substring(rootPrefix.length);
                    if (finalPath.startsWith('/')) finalPath = finalPath.substring(1);
                }
                promises.push(entry.async('uint8array').then(data => {
                    let binary = ''; data.forEach(b => binary += String.fromCharCode(b));
                    files.push({ path: finalPath, contentBase64: btoa(binary) });
                }));
            });
            await Promise.all(promises);
            return files;
        }

        // ---------- TAB INIT ----------
        function initPushTab() {
            const filesMode = document.querySelector('input[value="files"]');
            const zipMode = document.querySelector('input[value="zip"]');
            const filesArea = document.getElementById('pushFilesArea');
            const zipArea = document.getElementById('pushZipArea');
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const zipInput = document.getElementById('zipInput');
            const pushBtn = document.getElementById('pushBtn');
            const status = document.getElementById('pushStatus');

            filesMode.addEventListener('change', () => { filesArea.classList.remove('hidden'); zipArea.classList.add('hidden'); });
            zipMode.addEventListener('change', () => { filesArea.classList.add('hidden'); zipArea.classList.remove('hidden'); });
            dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
            dropZone.addEventListener('drop', e => {
                e.preventDefault(); dropZone.classList.remove('drag-over');
                if (zipMode.checked && e.dataTransfer.files.length) zipInput.files = e.dataTransfer.files;
                else if (e.dataTransfer.files.length) fileInput.files = e.dataTransfer.files;
            });
            dropZone.addEventListener('click', () => zipMode.checked ? zipInput.click() : fileInput.click());

            pushBtn.addEventListener('click', async () => {
                const c = getCreds();
                if (!c.token || !c.owner || !c.repo) {
                    status.textContent = 'Fill in all credential fields.';
                    status.className = 'text-sm text-center text-red-600 min-h-[20px]'; return;
                }
                const msg = document.getElementById('commitMsg').value.trim() || 'Web push commit';
                const isZip = zipMode.checked;
                let files = [];
                try {
                    if (isZip) {
                        if (!zipInput.files[0]) { status.textContent = 'Select a ZIP file.'; return; }
                        files = await processZip(zipInput.files[0], document.getElementById('stripRoot').checked);
                    } else {
                        if (!fileInput.files.length) { status.textContent = 'Select at least one file.'; return; }
                        for (const f of fileInput.files) files.push({ path: f.name, contentBase64: await fileToBase64(f) });
                    }
                    if (!files.length) { status.textContent = 'No files to push.'; return; }
                    status.textContent = 'Pushing...'; status.className = 'text-sm text-center text-[#555555] animate-pulse-subtle';
                    pushBtn.disabled = true;

                    const { token, owner, repo, branch } = c;
                    let baseSha = null, emptyRepo = false;
                    const refRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/ref/heads/${branch}`, { headers: apiHeaders(token) });
                    if (refRes.ok) baseSha = (await refRes.json()).object.sha;
                    else {
                        const err = await refRes.json().catch(() => ({}));
                        if (refRes.status === 409 && err.message?.includes('empty')) emptyRepo = true;
                        else if (refRes.status === 404) {
                            const heads = await (await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads`, { headers: apiHeaders(token) })).json();
                            if (!heads.length) emptyRepo = true;
                            else throw new Error(`Branch "${branch}" not found. Available: ${heads.map(h=>h.ref.replace('refs/heads/','')).join(', ')}`);
                        } else throw new Error(err.message || 'Branch fetch failed');
                    }

                    const blobs = [];
                    for (const f of files) {
                        const blobRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/blobs`, {
                            method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: f.contentBase64, encoding: 'base64' })
                        });
                        if (!blobRes.ok) throw new Error(`Blob failed for ${f.path}`);
                        blobs.push({ path: f.path, sha: (await blobRes.json()).sha });
                    }
                    const treeItems = blobs.map(b => ({ path: b.path, mode: '100644', type: 'blob', sha: b.sha }));
                    const treeBody = { tree: treeItems }; if (!emptyRepo) treeBody.base_tree = baseSha;
                    const treeRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees`, {
                        method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' }, body: JSON.stringify(treeBody)
                    });
                    if (!treeRes.ok) throw new Error('Tree creation failed');
                    const treeSha = (await treeRes.json()).sha;
                    const commitRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/commits`, {
                        method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: msg, tree: treeSha, parents: emptyRepo ? [] : [baseSha] })
                    });
                    if (!commitRes.ok) throw new Error('Commit failed');
                    const commitSha = (await commitRes.json()).sha;
                    if (emptyRepo) {
                        await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs`, {
                            method: 'POST', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ref: `refs/heads/${branch}`, sha: commitSha })
                        });
                    } else {
                        await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/${branch}`, {
                            method: 'PATCH', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sha: commitSha })
                        });
                    }
                    status.textContent = `Successfully pushed ${blobs.length} file(s) to "${branch}".`;
                    status.className = 'text-sm text-center text-green-600 min-h-[20px]';
                    notify('Push successful');
                } catch (err) {
                    status.textContent = `Error: ${err.message}`;
                    status.className = 'text-sm text-center text-red-600 min-h-[20px]';
                } finally { pushBtn.disabled = false; }
            });
        }

        function initPullTab() {
            document.getElementById('pullBtn').addEventListener('click', async () => {
                const c = getCreds();
                const status = document.getElementById('pullStatus');
                if (!c.token || !c.owner || !c.repo) {
                    status.textContent = 'Fill in all credential fields.';
                    status.className = 'text-sm text-center text-red-600 min-h-[20px]'; return;
                }
                status.textContent = 'Downloading...'; status.className = 'text-sm text-center text-[#555555] animate-pulse-subtle';
                try {
                    const url = `https://api.github.com/repos/${c.owner}/${c.repo}/zipball/${c.branch}`;
                    const res = await fetch(url, { headers: apiHeaders(c.token) });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.message || `Download failed (${res.status})`);
                    }
                    const blob = await res.blob();
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `${c.repo}-${c.branch}.zip`;
                    document.body.appendChild(a); a.click(); a.remove();
                    URL.revokeObjectURL(a.href);
                    status.textContent = 'Download started.';
                    status.className = 'text-sm text-center text-green-600 min-h-[20px]';
                    notify('Pull successful');
                } catch (err) {
                    status.textContent = err instanceof TypeError ? 'Network error - check connection/token.' : `Error: ${err.message}`;
                    status.className = 'text-sm text-center text-red-600 min-h-[20px]';
                }
            });
        }

        function initBrowseTab() {
            const c = getCreds();
            if (!c.token || !c.owner || !c.repo) {
                document.getElementById('fileList').innerHTML = '<p class="text-sm text-[#555555] p-4">Please fill in credentials above.</p>';
                return;
            }
            let currentPath = '';
            const { owner, repo, branch, token } = c;

            async function loadTree(path = '') {
                const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
                try {
                    const res = await fetch(url, { headers: apiHeaders(token) });
                    if (currentTab !== 'browse') return; // 🔥 skip if tab changed
                    if (!res.ok) throw new Error('Failed to load tree');
                    const data = await res.json();
                    const items = data.tree.filter(item => {
                        if (!path) return !item.path.includes('/');
                        return item.path.startsWith(path + '/') && item.path.split('/').length === path.split('/').length + 1;
                    }).map(item => ({ name: path ? item.path.substring(path.length + 1) : item.path, fullPath: item.path, type: item.type }));
                    renderFileList(items, path);
                    if (db && currentTab === 'browse') {
                        try {
                            const tx = db.transaction(STORE_NAME, 'readwrite');
                            tx.objectStore(STORE_NAME).put(JSON.stringify(items), `tree_${path || 'root'}`);
                        } catch(e) {}
                    }
                } catch (err) {
                    if (currentTab !== 'browse') return;
                    const container = document.getElementById('fileList');
                    if (container) container.innerHTML = `<p class="text-sm text-red-600 p-4">${err.message}</p>`;
                }
            }

            function renderFileList(items, path) {
                const container = document.getElementById('fileList');
                if (!container) return; // element removed
                if (!items.length) {
                    container.innerHTML = '<p class="text-sm text-[#888888] p-3">This directory is empty.</p>';
                } else {
                    container.innerHTML = items.map((item, i) => `
                        <div class="stagger-item flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all hover:bg-gray-100 group"
                             style="animation-delay: ${i * 0.05}s" data-path="${item.fullPath}" data-type="${item.type}">
                            <span class="text-xs font-mono text-[#888888] w-5">${item.type==='tree'?'[D]':'[F]'}</span>
                            <span class="text-sm text-black flex-1 truncate">${item.name}</span>
                            <span class="text-xs text-[#aaaaaa] opacity-0 group-hover:opacity-100 transition-opacity">${item.type==='tree'?'Open':'View'}</span>
                        </div>`).join('');
                }
                // Breadcrumb
                const bread = document.getElementById('breadcrumb');
                if (!bread) return;
                if (!path) bread.innerHTML = '<span class="text-black font-medium">Root</span>';
                else {
                    const parts = path.split('/');
                    let cumPath = '';
                    bread.innerHTML = '<span class="cursor-pointer text-[#555555] hover:text-black transition-colors" data-nav="">Root</span>';
                    parts.forEach((p, i) => {
                        cumPath += (i > 0 ? '/' : '') + p;
                        bread.innerHTML += ` <span class="text-[#aaaaaa]">/</span> <span class="cursor-pointer text-[#555555] hover:text-black transition-colors" data-nav="${cumPath}">${p}</span>`;
                    });
                }
                attachBrowseListeners();
            }

            function attachBrowseListeners() {
                document.querySelectorAll('#fileList div[data-path]').forEach(el => {
                    el.removeEventListener('click', fileClickHandler);
                    el.addEventListener('click', fileClickHandler);
                });
                document.querySelectorAll('#breadcrumb span[data-nav]').forEach(el => {
                    el.removeEventListener('click', breadClickHandler);
                    el.addEventListener('click', breadClickHandler);
                });
            }
            function fileClickHandler(e) {
                const fp = e.currentTarget.dataset.path;
                if (e.currentTarget.dataset.type === 'tree') {
                    currentPath = fp;
                    loadTree(fp);
                } else viewFile(fp);
            }
            function breadClickHandler(e) {
                currentPath = e.currentTarget.dataset.nav || '';
                loadTree(currentPath);
            }

            async function viewFile(filePath) {
                const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}?ref=${branch}`;
                try {
                    const fileRes = await fetch(fileUrl, { headers: apiHeaders(token) });
                    if (currentTab !== 'browse') return;
                    if (!fileRes.ok) { showToast('Failed to load file'); return; }
                    const fileData = await fileRes.json();
                    const content = atob(fileData.content);
                    const viewer = document.getElementById('fileContentViewer');
                    if (!viewer) return;
                    viewer.classList.remove('hidden');
                    viewer.style.animation = 'fadeInUp 0.3s ease';
                    const codeView = document.getElementById('codeView');
                    codeView.textContent = content;
                    if (typeof hljs !== 'undefined') hljs.highlightElement(codeView);
                    document.getElementById('editFileFromBrowse').onclick = () => {
                        switchTab('editor');
                        setTimeout(() => {
                            document.getElementById('editorFilePath').value = filePath;
                            document.getElementById('editorContent').value = content;
                        }, 350);
                    };
                    document.getElementById('deleteFileFromBrowse').onclick = async () => {
                        if (!confirm(`Delete "${filePath}"?`)) return;
                        const delUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
                        const delRes = await fetch(delUrl, { headers: apiHeaders(token) });
                        const delData = await delRes.json();
                        const delResult = await fetch(delUrl, {
                            method: 'DELETE', headers: { ...apiHeaders(token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `Delete ${filePath}`, sha: delData.sha, branch })
                        });
                        if (delResult.ok) {
                            showToast('File deleted'); notify('File deleted');
                            viewer.classList.add('hidden');
                            loadTree(currentPath);
                        } else showToast('Delete failed');
                    };
                } catch (err) {
                    showToast(`Error: ${err.message}`);
                }
            }

            loadTree('');
        }

        function initHistoryTab() {
            const c = getCreds();
            if (!c.token || !c.owner || !c.repo) {
                document.getElementById('commitList').innerHTML = '<p class="text-sm text-[#555555] p-4">Fill credentials above.</p>';
                return;
            }
            (async () => {
                try {
                    const res = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/commits?sha=${c.branch}&per_page=25`, { headers: apiHeaders(c.token) });
                    if (currentTab !== 'history') return;
                    if (!res.ok) throw new Error('Failed to load commits');
                    const commits = await res.json();
                    const container = document.getElementById('commitList');
                    if (!container) return;
                    container.innerHTML = commits.map((cm, i) => `
                        <div class="stagger-item p-4 rounded-xl cursor-pointer hover:bg-gray-100 border border-[#e5e5e5] commit-item"
                             style="animation-delay:${i*0.05}s" data-sha="${cm.sha}">
                            <div class="font-medium text-black text-sm">${escapeHTML(cm.commit.message.split('\n')[0])}</div>
                            <div class="text-xs text-[#888888] mt-1 flex gap-3">
                                <span>${cm.sha.substring(0,8)}</span>
                                <span>${cm.commit.author?.name||'Unknown'}</span>
                                <span>${new Date(cm.commit.author?.date).toLocaleDateString()}</span>
                            </div>
                        </div>`).join('');
                    document.querySelectorAll('.commit-item').forEach(el => {
                        el.addEventListener('click', async () => {
                            const sha = el.dataset.sha;
                            const diffRes = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/commits/${sha}`, { headers: apiHeaders(c.token) });
                            if (currentTab !== 'history') return;
                            const commitData = await diffRes.json();
                            const files = commitData.files || [];
                            let diffText = '';
                            files.forEach(f => diffText += `\n--- ${f.filename} (${f.additions||0}+ / ${f.deletions||0}-)\n${f.patch||'Binary'}\n`);
                            const viewer = document.getElementById('diffViewer');
                            if (viewer) {
                                viewer.classList.remove('hidden');
                                viewer.style.animation = 'fadeInUp 0.3s ease';
                                document.getElementById('diffOutput').textContent = diffText || 'No changes.';
                            }
                        });
                    });
                } catch (err) {
                    if (currentTab !== 'history') return;
                    const container = document.getElementById('commitList');
                    if (container) container.innerHTML = `<p class="text-sm text-red-600 p-4">${err.message}</p>`;
                }
            })();
        }

        function initBranchesTab() {
            const c = getCreds();
            if (!c.token || !c.owner || !c.repo) {
                document.getElementById('branchList').innerHTML = '<p class="text-sm text-[#555555] p-4">Fill credentials above.</p>';
                return;
            }
            async function loadBranches() {
                try {
                    const res = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/branches`, { headers: apiHeaders(c.token) });
                    if (currentTab !== 'branches') return;
                    if (!res.ok) throw new Error('Failed to load branches');
                    const branches = await res.json();
                    const container = document.getElementById('branchList');
                    if (!container) return;
                    container.innerHTML = branches.map((b, i) => `
                        <div class="stagger-item flex justify-between items-center p-3 rounded-xl hover:bg-gray-100 border border-transparent"
                             style="animation-delay:${i*0.05}s">
                            <span class="text-sm text-black font-medium">${b.name}</span>
                            <button class="text-xs text-[#888888] hover:text-red-600 delete-branch-btn" data-name="${b.name}">Delete</button>
                        </div>`).join('');
                    document.querySelectorAll('.delete-branch-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            if (!confirm(`Delete branch "${btn.dataset.name}"?`)) return;
                            await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/git/refs/heads/${btn.dataset.name}`, { method: 'DELETE', headers: apiHeaders(c.token) });
                            showToast(`Branch "${btn.dataset.name}" deleted`);
                            loadBranches();
                        });
                    });
                } catch (err) {
                    if (currentTab !== 'branches') return;
                    const container = document.getElementById('branchList');
                    if (container) container.innerHTML = `<p class="text-sm text-red-600 p-4">${err.message}</p>`;
                }
            }
            loadBranches();
            document.getElementById('createBranchBtn').addEventListener('click', async () => {
                const name = document.getElementById('newBranchName').value.trim();
                if (!name) { showToast('Enter branch name'); return; }
                const refRes = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/git/ref/heads/${c.branch}`, { headers: apiHeaders(c.token) });
                if (!refRes.ok) { showToast('Base branch fetch failed'); return; }
                const refData = await refRes.json();
                const createRes = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/git/refs`, {
                    method: 'POST', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: `refs/heads/${name}`, sha: refData.object.sha })
                });
                if (createRes.ok) {
                    showToast(`Branch "${name}" created`);
                    document.getElementById('newBranchName').value = '';
                    loadBranches();
                } else {
                    const err = await createRes.json();
                    showToast(`Error: ${err.message}`);
                }
            });
        }

        function initPRsTab() {
            const c = getCreds();
            if (!c.token || !c.owner || !c.repo) {
                document.getElementById('prList').innerHTML = '<p class="text-sm text-[#555555] p-4">Fill credentials above.</p>';
                return;
            }
            async function loadPRs() {
                try {
                    const res = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/pulls?state=open`, { headers: apiHeaders(c.token) });
                    if (currentTab !== 'prs') return;
                    if (!res.ok) throw new Error('Failed to load PRs');
                    const prs = await res.json();
                    const container = document.getElementById('prList');
                    if (!container) return;
                    if (!prs.length) container.innerHTML = '<p class="text-sm text-[#888888] p-4">No open pull requests.</p>';
                    else container.innerHTML = prs.map((pr, i) => `
                        <div class="stagger-item p-4 rounded-xl border border-[#e5e5e5] hover:border-[#aaaaaa]" style="animation-delay:${i*0.05}s">
                            <div class="flex justify-between items-start gap-3">
                                <div><span class="text-sm font-medium text-black">#${pr.number}</span> <span class="text-sm text-black ml-2">${escapeHTML(pr.title)}</span></div>
                                <button class="text-xs text-[#888888] hover:text-green-600 merge-pr-btn" data-number="${pr.number}">Merge</button>
                            </div>
                            <div class="text-xs text-[#888888] mt-1">${pr.head.label} → ${pr.base.label}</div>
                        </div>`).join('');
                    document.querySelectorAll('.merge-pr-btn').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const num = btn.dataset.number;
                            const mergeRes = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/pulls/${num}/merge`, {
                                method: 'PUT', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' }, body: '{}'
                            });
                            if (mergeRes.ok) { showToast(`PR #${num} merged`); loadPRs(); }
                            else { const err = await mergeRes.json(); showToast(`Merge failed: ${err.message}`); }
                        });
                    });
                } catch (err) {
                    if (currentTab !== 'prs') return;
                    const container = document.getElementById('prList');
                    if (container) container.innerHTML = `<p class="text-sm text-red-600 p-4">${err.message}</p>`;
                }
            }
            loadPRs();
            document.getElementById('createPRBtn').addEventListener('click', async () => {
                const title = prompt('PR title:'); if (!title) return;
                const base = prompt('Base branch (default: main):', 'main') || 'main';
                const res = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/pulls`, {
                    method: 'POST', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, head: c.branch, base })
                });
                if (res.ok) { const pr = await res.json(); showToast(`PR #${pr.number} created`); loadPRs(); }
                else { const err = await res.json(); showToast(`Error: ${err.message}`); }
            });
        }

        function initEditorTab() {
            function renderStaged() {
                const list = document.getElementById('stagedList');
                if (!list) return;
                if (!stagedChanges.length) list.innerHTML = '<p class="text-xs text-[#888888] p-3 text-center">No changes staged.</p>';
                else list.innerHTML = stagedChanges.map((c, i) => `
                    <div class="stagger-item flex justify-between items-center p-3 rounded-xl bg-[#fafafa] border" style="animation-delay:${i*0.05}s">
                        <div><span class="text-xs font-medium text-black">${escapeHTML(c.path)}</span> <span class="text-xs text-[#888888] ml-2">(${c.action})</span></div>
                        <button class="text-xs text-[#888888] hover:text-red-600 remove-staged" data-index="${i}">Remove</button>
                    </div>`).join('');
                document.querySelectorAll('.remove-staged').forEach(btn => {
                    btn.addEventListener('click', () => {
                        stagedChanges.splice(parseInt(btn.dataset.index), 1);
                        renderStaged();
                    });
                });
            }

            document.getElementById('stageChangeBtn').addEventListener('click', () => {
                const path = document.getElementById('editorFilePath').value.trim();
                const content = document.getElementById('editorContent').value;
                if (!path) { showToast('Enter file path'); return; }
                stagedChanges.push({ path, content, action: 'edit' });
                renderStaged();
                showToast(`Staged: ${path}`);
            });

            document.getElementById('commitStagedBtn').addEventListener('click', async () => {
                if (!stagedChanges.length) { showToast('No changes staged'); return; }
                const c = getCreds();
                if (!c.token || !c.owner || !c.repo) { showToast('Fill credentials'); return; }
                const message = prompt('Commit message:', 'Multi-file edit') || 'Multi-file edit';
                try {
                    const blobs = [];
                    for (const ch of stagedChanges) {
                        const b64 = btoa(unescape(encodeURIComponent(ch.content)));
                        const blobRes = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/git/blobs`, {
                            method: 'POST', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: b64, encoding: 'base64' })
                        });
                        if (!blobRes.ok) throw new Error(`Blob failed for ${ch.path}`);
                        blobs.push({ path: ch.path, sha: (await blobRes.json()).sha });
                    }
                    const baseRef = await (await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/git/ref/heads/${c.branch}`, { headers: apiHeaders(c.token) })).json();
                    const treeItems = blobs.map(b => ({ path: b.path, mode: '100644', type: 'blob', sha: b.sha }));
                    const treeRes = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/git/trees`, {
                        method: 'POST', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ base_tree: baseRef.object.sha, tree: treeItems })
                    });
                    if (!treeRes.ok) throw new Error('Tree creation failed');
                    const treeSha = (await treeRes.json()).sha;
                    const commitRes = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/git/commits`, {
                        method: 'POST', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message, tree: treeSha, parents: [baseRef.object.sha] })
                    });
                    if (!commitRes.ok) throw new Error('Commit failed');
                    const commitSha = (await commitRes.json()).sha;
                    await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/git/refs/heads/${c.branch}`, {
                        method: 'PATCH', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sha: commitSha })
                    });
                    stagedChanges = [];
                    renderStaged();
                    showToast('Commit successful');
                    notify('Multi-file commit done');
                } catch (err) {
                    showToast(`Error: ${err.message}`);
                }
            });

            document.getElementById('clearStagedBtn').addEventListener('click', () => {
                stagedChanges = [];
                renderStaged();
                showToast('Staging cleared');
            });

            renderStaged();
        }

        function initSettingsTab() {
            document.getElementById('createRepoBtn').addEventListener('click', async () => {
                const c = getCreds(); if (!c.token) { showToast('Enter token'); return; }
                const name = document.getElementById('newRepoName').value.trim();
                if (!name) { showToast('Repo name required'); return; }
                const desc = document.getElementById('newRepoDesc').value.trim();
                const vis = document.getElementById('newRepoVis').value;
                const res = await fetch('https://api.github.com/user/repos', {
                    method: 'POST', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: desc, private: vis === 'private' })
                });
                const data = await res.json();
                if (res.ok) { showToast(`Repo "${name}" created`); document.getElementById('newRepoName').value = ''; document.getElementById('newRepoDesc').value = ''; }
                else showToast(`Error: ${data.message}`);
            });

            document.getElementById('updateSettingsBtn').addEventListener('click', async () => {
                const c = getCreds();
                if (!c.token || !c.owner || !c.repo) {
                    document.getElementById('settingsStatus').textContent = 'Fill credentials.';
                    return;
                }
                const desc = document.getElementById('updateRepoDesc').value.trim();
                const defBranch = document.getElementById('updateDefaultBranch').value.trim();
                const body = {}; if (desc) body.description = desc; if (defBranch) body.default_branch = defBranch;
                if (!Object.keys(body).length) { showToast('Nothing to update'); return; }
                const res = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}`, {
                    method: 'PATCH', headers: { ...apiHeaders(c.token), 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                });
                const status = document.getElementById('settingsStatus');
                if (res.ok) { status.textContent = 'Settings updated.'; status.className = 'text-sm text-center text-green-600'; }
                else { const err = await res.json(); status.textContent = `Error: ${err.message}`; status.className = 'text-sm text-center text-red-600'; }
            });
        }

        // Start
        loadCredentials();
        setupNav();
        openIndexedDB();
        if ('Notification' in window) Notification.requestPermission();
        switchTab('push');
    })();
</script>
</body>
</html>
